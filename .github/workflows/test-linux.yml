name: Test (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test (Linux)
    runs-on: ubuntu-latest
    # Swift toolchain 6.2 on Ubuntu 24.04, matching the macOS-side runner.
    container: swift:6.2-noble
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-spm-linux-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-linux-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run Swift Testing suite
        run: swift test
